name: pta_character_app
description: Official Pathways to Adventure Character Sheet App
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  hive_flutter: ^1.1.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  pdf: ^3.11.1
  flutter_svg: ^2.0.10
  path_provider: ^2.1.4
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  freezed: ^2.5.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/classes/
    - assets/vectors/
    - data_packs/core/
    - data_packs/preview/
